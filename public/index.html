<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>grok web</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles/main.css">
  <link rel="stylesheet" href="/static/styles/cards.css">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>
<aside id="sidebar">
  <div class="brand">
    <div>
      <span class="name">Grok</span><span class="pill">web</span>
    </div>
    <div class="icons">
      <button title="Search" aria-label="Search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </div>

  <div class="nav">
    <button id="new-session-btn" title="Start a new session in the current cwd">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New session
    </button>
    <button id="login-btn" title="Sign in to Grok">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign in
    </button>
    <button id="customize-btn" title="Session settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </div>

  <div class="section-head">
    <span>Projects</span>
    <span class="project-actions">
      <button class="icon-btn" id="show-empty-sessions" title="Show empty sessions" aria-label="Show empty sessions" aria-pressed="false">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/><circle cx="12" cy="12" r="2"/></svg>
      </button>
      <button class="icon-btn" id="refresh-recents" title="Refresh" aria-label="Refresh projects">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
    </span>
  </div>
  <div class="recents-search">
    <input id="recents-search" type="text" placeholder="Search projects…" />
  </div>
  <div class="recents" id="recents" aria-busy="true" aria-live="polite">
    <div class="recents-skeleton" aria-hidden="true">
      <div class="recent-skel"></div>
      <div class="recent-skel"></div>
      <div class="recent-skel"></div>
      <div class="recent-skel short"></div>
    </div>
  </div>
  <div class="sidebar-tools collapsed" aria-label="Tools">
    <button class="section-head tools-toggle" id="tools-toggle" type="button" aria-expanded="false" aria-controls="tools-nav">
      <span class="tools-label">
        <span class="tools-chevron">›</span>
        <span>Tools</span>
      </span>
      <span class="tools-count">11</span>
    </button>
    <div class="nav tools-nav" id="tools-nav" hidden>
      <button id="tool-inspect" title="grok inspect --json">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>
        <span>Inspect</span>
      </button>
      <button id="tool-mcp" title="grok mcp list">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8a4 4 0 0 1 4-4h2a4 4 0 0 1 0 8h-2a4 4 0 0 1-4-4z"/><path d="M17 16a4 4 0 0 1-4 4h-2a4 4 0 0 1 0-8h2a4 4 0 0 1 4 4z"/></svg>
        <span>MCP</span>
      </button>
      <button id="tool-worktrees" title="grok worktree list">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v12"/><path d="M18 9v12"/><path d="M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M18 3a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M6 6h9"/></svg>
        <span>Worktrees</span>
      </button>
      <button id="tool-models" title="grok models">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span>Models</span>
      </button>
      <button id="tool-routines" title="Manage scheduled routines">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span>Routines</span>
      </button>
      <button id="tool-memory" title="Browse cross-session memory files">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C7 2 3 5 3 9c0 2 1 4 3 5v6l3-2 3 2 3-2 3 2v-6c2-1 3-3 3-5 0-4-4-7-9-7z"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/></svg>
        <span>Memory</span>
      </button>
      <button id="tool-session-info" title="Show session info">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v.01M11 12h1v5h1"/></svg>
        <span>Session info</span>
      </button>
      <button id="tool-hooks" title="hooks help">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10v10H7z"/><path d="M4 12h3M17 12h3M12 4v3M12 17v3"/></svg>
        <span>Hooks</span>
      </button>
      <button id="tool-plugins" title="plugins help">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6v6h6v6h-6v6H9v-6H3V9h6z"/></svg>
        <span>Plugins</span>
      </button>
      <button id="tool-trace" title="Export current session trace">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>Trace</span>
      </button>
      <button id="tool-import" title="Import sessions from another grok install">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>
        <span>Import</span>
      </button>
    </div>
  </div>
  <div id="todo-panel" class="todo-panel" hidden>
    <div class="todo-head">Todos</div>
    <div class="todo-list" id="todo-list"></div>
  </div>
  <div id="bg-panel" class="todo-panel" hidden>
    <div class="todo-head">Background tasks</div>
    <div class="todo-list" id="bg-list"></div>
  </div>

  <div class="footer">
    <div class="avatar" id="user-avatar">?</div>
    <div class="who" id="user-name">Local user</div>
    <button class="model" id="footer-model" type="button" title="Change model">grok-build ▾</button>
  </div>
</aside>
<div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

<main id="main-content" tabindex="-1">
  <div class="topbar">
    <button class="mobile-sidebar-toggle" id="mobile-sidebar-toggle" type="button" aria-label="Open sidebar" aria-controls="sidebar" aria-expanded="false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="cwd-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </span>
    <span class="crumb" id="crumb">starting…</span>
    <button class="usage" id="usage" hidden type="button" title="Click for session info" aria-label="Show session info">
      <div class="usage-bar"><span id="usage-fill"></span></div>
      <span class="usage-num" id="usage-num"></span>
    </button>
    <div class="actions">
      <button id="workspace-btn" title="Change workspace" aria-label="Change workspace">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 12h6M15 9v6"/></svg>
      </button>
      <button id="share-btn" title="Share" aria-label="Share current session">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
      <button id="export-btn" title="Export chat" aria-label="Export current chat as text">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </div>
  <div class="recovery-slot" id="recovery-slot" hidden></div>
  <div class="update-slot" id="update-slot" hidden></div>

  <div class="log" id="log">
    <div class="log-inner" id="log-inner">
      <div class="welcome" id="welcome">
        <h2>What can I help with?</h2>
        <p class="welcome-sub">Pick a starter or type your own prompt below.</p>
        <div class="welcome-tiles">
          <button class="welcome-tile" data-prompt="Give me a high-level tour of this codebase. What are the entry points and how do the pieces fit?">
            <span class="welcome-tile-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h13"/><path d="M3 12h9"/><path d="M3 18h13"/><path d="M19 6l2 2-2 2"/><path d="M19 14l2 2-2 2"/></svg>
            </span>
            <strong>Tour the codebase</strong>
            <span>Map the structure and entry points</span>
          </button>
          <button class="welcome-tile" data-prompt="Find and explain any recent commits or uncommitted changes in this directory.">
            <span class="welcome-tile-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="12" r="2"/><path d="M6 8v8"/><path d="M8 6h7a3 3 0 0 1 3 3v1"/></svg>
            </span>
            <strong>Review recent changes</strong>
            <span>Commits, diffs, work in progress</span>
          </button>
          <button class="welcome-tile" data-prompt="Run the project's tests and report what passes, what fails, and where to look.">
            <span class="welcome-tile-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/><path d="M7 14h10"/></svg>
            </span>
            <strong>Run the tests</strong>
            <span>See what's passing and what's broken</span>
          </button>
          <button class="welcome-tile" data-prompt="Audit the dependencies in this project for outdated or vulnerable packages.">
            <span class="welcome-tile-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/><path d="m9 12 2 2 4-4"/></svg>
            </span>
            <strong>Audit dependencies</strong>
            <span>Outdated or vulnerable packages</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="status">connecting…</div>
  <div class="composer">
    <form id="form" class="composer-inner">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Type / for commands"></textarea>
        <div class="action-row">
          <button type="button" class="mode-pill auto" id="mode-pill" aria-pressed="true" title="Click to toggle. Auto = run tools without asking; Manual = ask before each tool">Auto-approve</button>
          <button type="button" class="icon-btn" id="attach-btn" title="Attach text files" aria-label="Attach text files">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button type="button" class="icon-btn" id="voice-btn" title="Voice input" aria-label="Voice input">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
          </button>
          <select class="send-mode" id="send-mode" title="How to dispatch this prompt">
            <option value="agent">Interactive</option>
            <option value="check">+ self-check (headless)</option>
            <option value="best3">Best of 3 (headless)</option>
            <option value="best5">Best of 5 (headless)</option>
          </select>
          <button class="model-tag" id="model-tag" type="button" title="Change model">grok-build</button>
          <button class="send-btn" id="send" type="submit" disabled aria-label="Send prompt">Send</button>
          <button class="stop-btn" id="stop" type="button" style="display:none" title="Cancel the running turn" aria-label="Cancel running turn">Stop</button>
        </div>
      </div>
    </form>
  </div>
</main>
<script type="module" src="/static/js/main.js"></script>
</body>
</html>
